services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vibe-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: vibe-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend