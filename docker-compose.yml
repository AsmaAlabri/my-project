services:
  backend:
    build:
      context: ./server
      dockerfile: server.Dockerfile
    container_name: npm run dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./client
      dockerfile: client.Dockerfile
    container_name:  npm run dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
